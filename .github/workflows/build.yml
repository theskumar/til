# This workflow:
# 1. Extracts weekly notes from til.md into weekly/*.md files
# 2. Builds static HTML site and deploys to GitHub Pages

name: Build & Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Extract weekly notes
        run: node extract-weekly.js

      - name: Commit repo changes
        run: |-
          git config --global user.email "actions@users.noreply.github.com"
          git config --global user.name "TIL Bot"
          git add -A
          git diff --staged --quiet || git commit --message "Update weekly notes and rss.xml"
          git push

      - name: Build static site
        run: node build-site.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
